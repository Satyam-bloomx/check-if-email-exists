services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - RCH__HTTP_HOST=0.0.0.0
      - RCH__HELLO_NAME=${RCH__HELLO_NAME:-localhost}
      - RCH__FROM_EMAIL=${RCH__FROM_EMAIL:-hello@localhost}
      - RCH__SMTP_TIMEOUT=${RCH__SMTP_TIMEOUT:-45}
      - RCH__WORKER__ENABLE=false
      - RUST_LOG=reacher=info
    restart: unless-stopped
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
